<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoveIn Student Homes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      MoveIn
    </a>
    <div class="topbar-actions">
      <a class="message-center-button" href="messages.html">
        Messages
        <span id="messageCountBadge" class="message-count">0</span>
      </a>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <p class="kicker">Student Housing Marketplace</p>
      <h1>Find your next apartment in minutes.</h1>
      <p class="hero-copy">Search verified listings, check details, view location, and chat with landlords in one place.</p>

      <form id="searchForm" class="search-grid" autocomplete="off">
        <label>
          City
          <input id="cityInput" type="text" list="hungaryCityOptions" placeholder="Debrecen, Budapest, Vienna...">
        </label>
        <label>
          Max price (Ft)
          <input id="priceInput" type="number" min="10000" step="1000" placeholder="250000">
        </label>
        <label>
          Listing purpose
          <select id="purposeInput">
            <option value="all">Any</option>
            <option value="rent">For rent</option>
            <option value="sale">For sale</option>
          </select>
        </label>
        <label>
          Property type
          <select id="typeInput">
            <option value="all">All types</option>
            <option value="studio">Studio</option>
            <option value="shared">Shared flat</option>
            <option value="apartment">Apartment</option>
          </select>
        </label>
        <button type="submit" class="btn primary">Search homes</button>
        <button type="button" id="resetFiltersBtn" class="btn ghost reset-filters-btn">Reset filters</button>
      </form>

      <datalist id="hungaryCityOptions">
        <option value="Budapest"></option>
        <option value="Debrecen"></option>
        <option value="Szeged"></option>
        <option value="Miskolc"></option>
        <option value="Pecs"></option>
        <option value="Gyor"></option>
        <option value="Nyiregyhaza"></option>
        <option value="Kecskemet"></option>
        <option value="Szekesfehervar"></option>
        <option value="Szombathely"></option>
        <option value="Szolnok"></option>
        <option value="Tatabanya"></option>
        <option value="Kaposvar"></option>
        <option value="Bekescsaba"></option>
        <option value="Zalaegerszeg"></option>
      </datalist>
    </section>

    <section class="results-head">
      <h2>Available listings</h2>
      <p id="resultCount" class="result-count"></p>
    </section>

    <section class="layout-grid">
      <div id="cards" class="card-grid" aria-live="polite"></div>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="listing-card">
      <img class="listing-image" alt="Apartment preview">
      <div class="listing-content">
        <div class="listing-row">
          <h3 class="listing-title"></h3>
          <span class="listing-price"></span>
        </div>
        <p class="listing-subtitle"></p>
        <p class="listing-rent-type"></p>
        <p class="listing-posted-date"></p>
        <div class="listing-meta-row">
          <p class="card-available"></p>
        </div>
        <button class="btn ghost view-details">View details</button>
      </div>
      <div class="card-details"></div>
    </article>
  </template>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
